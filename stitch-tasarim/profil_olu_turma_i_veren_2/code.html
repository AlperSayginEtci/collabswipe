<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Employer Profile Creation</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111c22", 
                        // Using #111c22 to match the provided component snippets exactly, 
                        // overriding the #101c22 from the prompt instructions to ensure 
                        // visual consistency with the provided examples.
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111c22] dark:text-white font-display">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-xl bg-background-light dark:bg-background-dark">
<!-- TopAppBar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between sticky top-0 z-10 backdrop-blur-sm">
<button class="text-inherit dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h2 class="text-inherit dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                Şirket Profili
            </h2>
</div>
<!-- PageIndicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-2 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-[#325567] dark:bg-[#325567]/50"></div>
<div class="h-2 w-2 rounded-full bg-[#325567] dark:bg-[#325567]/50"></div>
</div>
<div class="px-4 pb-6 flex-1 flex flex-col gap-6">
<!-- Logo Upload Section (Adapted from CameraControl) -->
<div class="flex flex-col items-center justify-center gap-4 py-4">
<div class="relative group cursor-pointer">
<div class="size-28 rounded-full bg-[#192b33] border-2 border-dashed border-[#325567] flex items-center justify-center overflow-hidden hover:border-primary transition-colors">
<span class="material-symbols-outlined text-[#92b7c9] text-4xl">add_a_photo</span>
</div>
<div class="absolute bottom-0 right-0 bg-primary size-8 rounded-full flex items-center justify-center border-[3px] border-[#111c22]">
<span class="material-symbols-outlined text-white text-sm font-bold">edit</span>
</div>
</div>
<p class="text-[#92b7c9] text-sm font-medium">Şirket Logosu Yükle</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5">
<!-- Headline -->
<div>
<h2 class="text-inherit dark:text-white tracking-light text-xl font-bold leading-tight text-left">
                        Kimlik Bilgileri
                    </h2>
</div>
<!-- Company Name Field -->
<label class="flex flex-col flex-1 gap-2">
<p class="text-inherit dark:text-white text-sm font-medium leading-normal ml-2">Şirket Adı</p>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-[#92b7c9]">
<span class="material-symbols-outlined text-xl">business</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-full text-inherit dark:text-white focus:outline-0 focus:ring-0 border border-[#325567] bg-white dark:bg-[#192b33] focus:border-primary h-14 placeholder:text-[#92b7c9]/70 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="Şirketinizin tam adı" value=""/>
</div>
</label>
<!-- Website Field -->
<label class="flex flex-col flex-1 gap-2">
<p class="text-inherit dark:text-white text-sm font-medium leading-normal ml-2">Web Sitesi</p>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-[#92b7c9]">
<span class="material-symbols-outlined text-xl">language</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-full text-inherit dark:text-white focus:outline-0 focus:ring-0 border border-[#325567] bg-white dark:bg-[#192b33] focus:border-primary h-14 placeholder:text-[#92b7c9]/70 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="www.sirketiniz.com" type="url" value=""/>
</div>
</label>
<!-- Location Field -->
<label class="flex flex-col flex-1 gap-2">
<p class="text-inherit dark:text-white text-sm font-medium leading-normal ml-2">Konum</p>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-[#92b7c9]">
<span class="material-symbols-outlined text-xl">location_on</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-full text-inherit dark:text-white focus:outline-0 focus:ring-0 border border-[#325567] bg-white dark:bg-[#192b33] focus:border-primary h-14 placeholder:text-[#92b7c9]/70 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="İstanbul, Türkiye" value=""/>
</div>
</label>
<!-- About TextArea -->
<label class="flex flex-col flex-1 gap-2">
<p class="text-inherit dark:text-white text-sm font-medium leading-normal ml-2">Şirket Hakkında</p>
<textarea class="form-textarea flex w-full min-w-0 flex-1 resize-none rounded-3xl text-inherit dark:text-white focus:outline-0 focus:ring-0 border border-[#325567] bg-white dark:bg-[#192b33] focus:border-primary h-32 placeholder:text-[#92b7c9]/70 p-4 text-base font-normal leading-normal transition-all" placeholder="Şirket kültürü ve vizyonunuzdan bahsedin..."></textarea>
</label>
</div>
<!-- Category Selection -->
<div class="pt-2 flex flex-col gap-3">
<h2 class="text-inherit dark:text-white tracking-light text-lg font-bold leading-tight text-left">
                    Sektör Seçimi
                </h2>
<p class="text-[#92b7c9] text-sm -mt-2">İlan vereceğiniz ana kategorileri seçin.</p>
<div class="flex flex-wrap gap-2 mt-2">
<!-- Active Chip -->
<button class="group flex items-center justify-center gap-2 rounded-full bg-primary/20 border border-primary px-4 py-2 text-sm font-medium text-primary hover:bg-primary hover:text-white transition-all">
<span class="material-symbols-outlined text-lg">check</span>
<span>Yazılım</span>
</button>
<!-- Inactive Chips -->
<button class="flex items-center justify-center gap-2 rounded-full bg-white dark:bg-[#192b33] border border-[#325567] px-4 py-2 text-sm font-medium text-[#92b7c9] hover:border-primary hover:text-primary transition-all">
<span>Tasarım</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-full bg-white dark:bg-[#192b33] border border-[#325567] px-4 py-2 text-sm font-medium text-[#92b7c9] hover:border-primary hover:text-primary transition-all">
<span>Pazarlama</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-full bg-white dark:bg-[#192b33] border border-[#325567] px-4 py-2 text-sm font-medium text-[#92b7c9] hover:border-primary hover:text-primary transition-all">
<span>İnsan Kaynakları</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-full bg-white dark:bg-[#192b33] border border-[#325567] px-4 py-2 text-sm font-medium text-[#92b7c9] hover:border-primary hover:text-primary transition-all">
<span>Finans</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-full bg-white dark:bg-[#192b33] border border-[#325567] px-4 py-2 text-sm font-medium text-[#92b7c9] hover:border-primary hover:text-primary transition-all">
<span class="material-symbols-outlined text-lg">add</span>
<span>Diğer</span>
</button>
</div>
</div>
<div class="h-20"></div> <!-- Spacer for fixed footer -->
</div>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent z-20 max-w-md mx-auto">
<button class="flex w-full items-center justify-center rounded-full bg-primary py-4 px-6 text-white text-base font-bold shadow-lg shadow-primary/25 hover:bg-primary/90 active:scale-[0.98] transition-all">
                Kaydet ve Devam Et
            </button>
</div>
</div>
</body></html>
