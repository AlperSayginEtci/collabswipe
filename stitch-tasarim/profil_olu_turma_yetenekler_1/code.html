<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        },
      }

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-hidden">
<!-- Main Container (Mobile Form Factor) -->
<div class="relative flex h-full min-h-screen w-full flex-col overflow-y-auto overflow-x-hidden mx-auto max-w-md bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Profil Oluşturma</h2>
</div>

<div class="flex w-full flex-row items-center justify-center gap-3 py-5">

</div>

<div class="flex flex-col px-4">

<p class="text-slate-600 dark:text-[#92b7c9] text-base font-normal leading-normal pb-6">Sana en uygun iş fırsatlarını bulabilmemiz için yeteneklerini ekle. En az 3 yetenek seçmen önerilir.</p>
</div>
<!-- Search Bar -->
<div class="px-4 pb-4">
<label class="flex flex-col h-14 w-full">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full shadow-sm">
<div class="text-slate-500 dark:text-[#92b7c9] flex border-none bg-white dark:bg-surface-dark items-center justify-center pl-4 rounded-l-xl border-r-0">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border-none bg-white dark:bg-surface-dark focus:border-none h-full placeholder:text-slate-400 dark:placeholder:text-[#92b7c9] px-4 rounded-l-none border-l-0 pl-2 text-base font-normal leading-normal" placeholder="Yetenek ara (örn. Swift, Pazarlama)" value=""/>
</div>
</label>
</div>

<div class="px-4 py-2">

<button class="group flex items-center gap-2 rounded-full bg-primary px-4 py-2 text-sm font-medium text-white shadow-md hover:bg-primary/90 transition-all">

</button>
<!-- Selected Chip 2 -->

<span class="material-symbols-outlined text-[16px]">close</span>
</button>

<button class="group flex items-center gap-2 rounded-full bg-primary px-4 py-2 text-sm font-medium text-white shadow-md hover:bg-primary/90 transition-all">

</button>
</div>
</div>

<span>Adobe XD</span>
<span class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary">add</span>

<span>User Research</span>
<span class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary">add</span>
</button>
<button class="flex items-center gap-2 rounded-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-transparent px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-primary/20 hover:border-primary/50 transition-all">
<span>Wireframing</span>
<span class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary">add</span>
</button>
<button class="flex items-center gap-2 rounded-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-transparent px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-primary/20 hover:border-primary/50 transition-all">

<span class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary">add</span>
</button>
<button class="flex items-center gap-2 rounded-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-transparent px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-primary/20 hover:border-primary/50 transition-all">
<span>HTML/CSS</span>
<span class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary">add</span>

<button class="flex items-center gap-2 rounded-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-transparent px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-primary/20 hover:border-primary/50 transition-all">
<span>Mobile Design</span>
<span class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary">add</span>
</button>

<button class="flex w-full items-center justify-center rounded-full bg-primary px-6 py-4 text-base font-bold text-white shadow-lg shadow-primary/25 hover:bg-primary/90 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    Devam Et
                </button>
<button class="flex w-full items-center justify-center rounded-full bg-transparent px-6 py-2 text-base font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
