<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profil Oluşturma - Eğitim</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "surface-dark": "#1c2a33", 
                        "surface-highlight": "#233c48",
                        "text-secondary": "#92b7c9"
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "1.5rem", 
                        "xl": "2rem", 
                        "2xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display antialiased overflow-x-hidden transition-colors duration-300">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-50 bg-background-light dark:bg-background-dark/95 backdrop-blur-md border-b border-gray-200 dark:border-white/5 px-4 pt-4 pb-2">
<div class="flex items-center justify-between h-12">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 text-slate-900 dark:text-white transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold tracking-tight">Profil Oluşturma</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Indicators -->
<div class="flex w-full items-center justify-center gap-2 py-4">
<div class="h-1.5 w-8 rounded-full bg-primary/30"></div>
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-highlight"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-highlight"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-5 pb-32 pt-2">
<!-- Header Section -->
<div class="mb-6 animate-fade-in">
<h1 class="text-slate-900 dark:text-white text-[28px] font-bold leading-tight mb-2">Eğitim Geçmişin</h1>
<p class="text-slate-500 dark:text-text-secondary text-base font-normal leading-relaxed">
                Profilini güçlendirmek için okuduğun okulları ve aldığın dereceleri ekle.
            </p>
</div>
<!-- List of Added Items -->
<div class="flex flex-col gap-4 mb-8">
<!-- Example Added Item -->
<div class="group relative flex items-center gap-4 bg-white dark:bg-surface-dark p-4 rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-white/5 transition-all active:scale-[0.99]">
<div class="flex items-center justify-center rounded-lg bg-blue-50 dark:bg-surface-highlight shrink-0 size-12 text-primary dark:text-white">
<span class="material-symbols-outlined text-[24px]">school</span>
</div>
<div class="flex flex-col flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-base font-semibold leading-snug truncate">Boğaziçi Üniversitesi</p>
<p class="text-slate-500 dark:text-text-secondary text-sm font-normal leading-normal truncate">Bilgisayar Mühendisliği • 2018 - 2022</p>
</div>
<button class="shrink-0 size-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-white/10 text-slate-400 dark:text-white/60 transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</div>
</div>
<!-- Add New Education Form -->
<div class="flex flex-col gap-5">
<div class="flex items-center justify-between">
<h3 class="text-slate-900 dark:text-white text-lg font-bold">Yeni Ekle</h3>
</div>
<!-- School Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined">search</span>
</div>
<input class="w-full bg-gray-50 dark:bg-surface-dark border-transparent dark:border-white/5 focus:border-primary focus:ring-0 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary/50 font-medium transition-all" placeholder="Okul adı ara..." type="text"/>
</div>
<!-- Degree & Field Inputs -->
<div class="grid grid-cols-1 gap-4">
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined">workspace_premium</span>
</div>
<select class="w-full bg-gray-50 dark:bg-surface-dark border-transparent dark:border-white/5 focus:border-primary focus:ring-0 rounded-xl py-4 pl-12 pr-10 text-slate-900 dark:text-white appearance-none font-medium transition-all cursor-pointer">
<option class="text-gray-400" disabled="" selected="" value="">Derece Seçin</option>
<option value="lisans">Lisans</option>
<option value="yukseklisans">Yüksek Lisans</option>
<option value="doktora">Doktora</option>
<option value="onlisans">Ön Lisans</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined">menu_book</span>
</div>
<input class="w-full bg-gray-50 dark:bg-surface-dark border-transparent dark:border-white/5 focus:border-primary focus:ring-0 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary/50 font-medium transition-all" placeholder="Bölüm (Örn: İşletme)" type="text"/>
</div>
</div>
<!-- Date Inputs -->
<div class="flex gap-4">
<div class="relative flex-1">
<label class="block text-xs font-medium text-slate-500 dark:text-text-secondary mb-1.5 ml-1">Başlangıç</label>
<div class="relative">
<input class="w-full bg-gray-50 dark:bg-surface-dark border-transparent dark:border-white/5 focus:border-primary focus:ring-0 rounded-xl py-3.5 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary/50 font-medium text-center transition-all" onblur="(this.type='text')" onfocus="(this.type='month')" placeholder="Ay / Yıl" type="text"/>
</div>
</div>
<div class="relative flex-1">
<label class="block text-xs font-medium text-slate-500 dark:text-text-secondary mb-1.5 ml-1">Bitiş (veya Beklenen)</label>
<div class="relative">
<input class="w-full bg-gray-50 dark:bg-surface-dark border-transparent dark:border-white/5 focus:border-primary focus:ring-0 rounded-xl py-3.5 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary/50 font-medium text-center transition-all" onblur="(this.type='text')" onfocus="(this.type='month')" placeholder="Ay / Yıl" type="text"/>
</div>
</div>
</div>
<!-- Add Another Button -->
<button class="flex items-center justify-center gap-2 w-full py-4 mt-2 rounded-xl border border-dashed border-primary/40 bg-primary/5 hover:bg-primary/10 text-primary font-semibold transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">add_circle</span>
                Listeye Ekle
            </button>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-5 bg-background-light dark:bg-background-dark/80 backdrop-blur-xl border-t border-gray-200 dark:border-white/5 z-50">
<div class="max-w-md mx-auto flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-lg py-4 rounded-full shadow-lg shadow-primary/25 transition-all transform active:scale-[0.98]">
                Devam Et
            </button>
<button class="w-full bg-transparent text-slate-500 dark:text-text-secondary font-medium py-2 hover:text-slate-700 dark:hover:text-white transition-colors">
                Şimdilik Atla
            </button>
</div>
</div>
</body></html>
