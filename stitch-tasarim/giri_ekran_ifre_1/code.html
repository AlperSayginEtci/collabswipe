<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Giriş Ekranı - Şifre</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "surface-dark": "#192b33",
                        "border-dark": "#325567",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom tweaks for smooth inputs */
        .form-input-custom:focus {
            box-shadow: 0 0 0 2px rgba(19, 164, 236, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-x-hidden selection:bg-primary selection:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto p-4">
<!-- Top Navigation -->
<header class="flex items-center justify-between py-2">
<button class="flex size-10 items-center justify-center rounded-full text-slate-500 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex flex-col flex-1 pt-6">
<!-- Headline -->
<div class="mb-6 px-1">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white leading-tight">
                    Tekrar Hoşgeldin
                </h1>
<p class="mt-2 text-slate-500 dark:text-slate-400 text-sm">
                    Devam etmek için lütfen şifreni gir.
                </p>
</div>
<!-- User Identity Chip -->
<div class="mb-8 px-1">
<div class="inline-flex h-9 items-center gap-x-2 rounded-full bg-slate-200 dark:bg-surface-dark border border-slate-300 dark:border-border-dark pl-3 pr-4 shadow-sm">
<span class="material-symbols-outlined text-lg text-primary">account_circle</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">zeynep@example.com</span>
<button class="ml-2 flex items-center justify-center text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">edit</span>
</button>
</div>
</div>
<!-- Password Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="sr-only" for="password">Şifreniz</label>
<div class="relative flex items-center">
<input class="form-input-custom w-full h-14 rounded-full border border-slate-300 dark:border-border-dark bg-white dark:bg-surface-dark px-6 pr-14 text-base text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-primary focus:ring-0 transition-all outline-none" id="password" placeholder="Şifreniz" type="password" value=""/>
<button class="absolute right-4 flex items-center justify-center text-slate-400 hover:text-primary transition-colors p-2" type="button">
<span class="material-symbols-outlined text-2xl">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link (Right Aligned) -->
<div class="flex justify-end px-2">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">
                        Şifremi Unuttum?
                    </a>
</div>
<!-- Spacer to push button down slightly or keep it close -->
<div class="mt-4"></div>
<!-- Primary Action Button -->
<button class="w-full h-14 rounded-full bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center shadow-lg shadow-primary/25">
<span class="text-white text-lg font-bold tracking-wide">Giriş Yap</span>
<span class="material-symbols-outlined ml-2 text-white">login</span>
</button>
</form>
</main>
<!-- Footer / Keyboard Spacer Area -->
<div class="h-6 w-full"></div>
</div>
</body></html>
