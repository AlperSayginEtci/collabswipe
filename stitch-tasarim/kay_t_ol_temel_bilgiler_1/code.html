<!DOCTYPE html>
<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kayıt Ol - Temel Bilgiler</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#A78BFA","background-light": "#f8fafc",
                        "background-dark": "#0F172A","surface-dark": "#1E293B","border-dark": "#334155","text-main": "#F1F5F9","text-secondary": "#94A3B8",},
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 20px;
        }input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #1E293B inset !important;
            -webkit-text-fill-color: #F1F5F9 !important;
            transition: background-color 5000s ease-in-out 0s;
            caret-color: #F1F5F9;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-text-main min-h-screen flex flex-col overflow-x-hidden selection:bg-primary/30">
<header class="flex items-center justify-between p-4 sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="group flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-slate-800 dark:text-text-main group-active:scale-95 transition-transform" style="font-size: 24px;">arrow_back</span>
</button>
<div class="text-xs font-medium text-slate-500 dark:text-text-secondary">Adım 1/3</div>
</header>
<main class="flex-1 flex flex-col w-full max-w-md mx-auto px-6 pb-6">
<div class="mt-4 mb-8 animate-fade-in-up">
<h1 class="text-3xl md:text-[32px] font-bold tracking-tight text-slate-900 dark:text-text-main leading-tight mb-3">
                Aramıza Katıl
            </h1>
<p class="text-base text-slate-600 dark:text-text-secondary font-normal leading-relaxed">
                İş dünyasındaki eşleşmeni bulmak için bilgilerini gir.
            </p>
</div>
<form class="flex flex-col gap-5" onsubmit="event.preventDefault()">
<div class="flex flex-col sm:flex-row gap-4">
<div class="flex-1">
<label class="sr-only" for="first-name">Adınız</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-text-secondary group-focus-within:text-primary transition-colors duration-200" style="font-size: 20px;">person</span>
</div>
<input autocomplete="given-name" class="form-input block w-full pl-11 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-full text-base placeholder-slate-400 dark:placeholder-text-secondary/70 text-slate-900 dark:text-text-main focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="first-name" placeholder="Adınız" type="text"/>
</div>
</div>
<div class="flex-1">
<label class="sr-only" for="last-name">Soyadınız</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-text-secondary group-focus-within:text-primary transition-colors duration-200" style="font-size: 20px;">badge</span>
</div>
<input autocomplete="family-name" class="form-input block w-full pl-11 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-full text-base placeholder-slate-400 dark:placeholder-text-secondary/70 text-slate-900 dark:text-text-main focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="last-name" placeholder="Soyadınız" type="text"/>
</div>
</div>
</div>
<div>
<label class="sr-only" for="email">E-posta Adresi</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-text-secondary group-focus-within:text-primary transition-colors duration-200" style="font-size: 20px;">mail</span>
</div>
<input autocomplete="email" class="form-input block w-full pl-11 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-full text-base placeholder-slate-400 dark:placeholder-text-secondary/70 text-slate-900 dark:text-text-main focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" placeholder="E-posta Adresi" type="email"/>
</div>
</div>
<div>
<label class="sr-only" for="password">Şifre</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-text-secondary group-focus-within:text-primary transition-colors duration-200" style="font-size: 20px;">lock</span>
</div>
<input autocomplete="new-password" class="form-input block w-full pl-11 pr-12 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-border-dark rounded-full text-base placeholder-slate-400 dark:placeholder-text-secondary/70 text-slate-900 dark:text-text-main focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" placeholder="Şifre" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 dark:text-text-secondary hover:text-slate-600 dark:hover:text-text-main transition-colors cursor-pointer focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
<p class="mt-2 text-xs text-slate-500 dark:text-text-secondary ml-4">Şifreniz en az 8 karakter olmalıdır.</p>
</div>
<div class="flex-grow min-h-[40px]"></div>
<div class="mt-auto flex flex-col gap-4">
<button class="w-full h-14 bg-primary hover:bg-primary/90 active:scale-[0.99] text-white text-base font-semibold rounded-full shadow-lg shadow-primary/20 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Kayıt Ol</span>
<span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
<div class="text-center">
<p class="text-sm text-slate-600 dark:text-text-secondary">
                        Zaten hesabın var mı? 
                        <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Giriş Yap</a>
</p>
</div>
</div>
</form>
</main>
<div class="fixed top-0 left-0 w-full h-64 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none -z-10" data-alt="Subtle purple gradient at the top of the dark screen for atmosphere"></div>

</body></html>
