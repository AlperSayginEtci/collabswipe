<!DOCTYPE html>
<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kayıt Ol - Profil Detayları - Collab Swipe</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#A78BFA",
                        "background-light": "#f8fafc",
                        "background-dark": "#0F172A",
                        "surface-dark": "#1E293B",
                        "surface-highlight": "#334155",
                        "text-main": "#F1F5F9",
                        "text-secondary": "#94A3B8",
                        "swipe-right": "#34D399",
                        "swipe-left": "#FB7185"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(800px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen w-full flex justify-center overflow-x-hidden">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark shadow-xl overflow-hidden">
<div class="flex items-center justify-between px-6 pt-6 pb-2 z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-white/10 text-slate-900 dark:text-text-main hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-sm font-medium text-slate-500 dark:text-text-secondary">Adım 2/3</div>
<button class="flex items-center justify-center h-10 px-2 rounded-full text-sm font-semibold text-primary hover:text-violet-400 transition-colors">
                Atla
            </button>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar">
<div class="flex flex-col items-center px-6 pt-4 pb-8">
<div class="relative group cursor-pointer mb-6">
<div class="w-28 h-28 rounded-[2rem] bg-slate-200 dark:bg-surface-highlight flex items-center justify-center overflow-hidden border-4 border-white dark:border-background-dark shadow-lg shadow-primary/10 group-hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-5xl text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">add_a_photo</span>
</div>
<div class="absolute -bottom-2 -right-2 bg-primary text-background-dark w-10 h-10 rounded-full flex items-center justify-center border-4 border-white dark:border-background-dark shadow-sm">
<span class="material-symbols-outlined text-lg">edit</span>
</div>
</div>
<h1 class="text-slate-900 dark:text-text-main text-3xl font-bold text-center leading-tight mb-2">
                    Profil Detayları
                </h1>
<p class="text-slate-500 dark:text-text-secondary text-center text-sm px-4 leading-relaxed">
                    Kendini tanıtarak Collab Swipe'da daha fazla dikkat çek. Bu bilgiler profilinde herkese açık olacak.
                </p>
</div>
<div class="flex flex-col gap-5 px-6 pb-6">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-text-main text-sm font-medium ml-1">Biyografi</span>
<div class="relative">
<div class="absolute left-4 top-4 text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined text-[20px]">edit_note</span>
</div>
<textarea class="w-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-surface-highlight rounded-2xl h-32 pl-12 pr-4 py-4 text-slate-900 dark:text-text-main placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-base resize-none" placeholder="Yeteneklerinden ve deneyimlerinden kısaca bahset..."></textarea>
</div>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-text-main text-sm font-medium ml-1">Web Sitesi / Portfolyo</span>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined text-[20px]">link</span>
</div>
<input class="w-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-surface-highlight rounded-2xl h-14 pl-12 pr-4 text-slate-900 dark:text-text-main placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-base" placeholder="https://seninsiten.com" type="url"/>
</div>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-text-main text-sm font-medium ml-1">Konum</span>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-text-secondary">
<span class="material-symbols-outlined text-[20px]">location_on</span>
</div>
<input class="w-full bg-white dark:bg-surface-dark border border-slate-200 dark:border-surface-highlight rounded-2xl h-14 pl-12 pr-4 text-slate-900 dark:text-text-main placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-base" placeholder="Şehir, Ülke" type="text"/>
</div>
</label>
</div>
<div class="h-6"></div>
</div>
<div class="p-6 mt-auto border-t border-slate-100 dark:border-surface-highlight bg-white/50 dark:bg-surface-dark/30 backdrop-blur-sm">
<button class="w-full h-14 bg-primary hover:bg-violet-400 active:scale-[0.98] transition-all rounded-full flex items-center justify-center shadow-lg shadow-primary/25 group">
<span class="text-background-dark text-base font-bold tracking-wide mr-2">Kaydı Tamamla</span>
<span class="material-symbols-outlined text-background-dark group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>

</body></html>
