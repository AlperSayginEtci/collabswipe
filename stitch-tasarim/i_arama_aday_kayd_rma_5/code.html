<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Job Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "card-dark": "#192b33",
                        "surface-dark": "#111c22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(19, 164, 236, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white h-screen flex flex-col overflow-hidden selection:bg-primary selection:text-white">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-5 py-4 shrink-0 z-30">
<!-- Profile Avatar -->
<div class="relative group cursor-pointer">
<div class="size-10 rounded-full overflow-hidden border-2 border-transparent group-hover:border-primary transition-all">
<img class="w-full h-full object-cover" data-alt="User profile avatar showing a smiling man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhxXvpw30O-gHy0vRz26ZubSKtGF5L9LT0SRbybHbRIajjTRZtlrR3ZaQPtx7fEXKKmR_JM5AD4VvGbIIn5ZAjqQ7t3ydPpEUYwgDVS9FKvyO2tWDoAYkCvysilIKq2DRVtfjGE03j1HBjBxgXuByG4xqNK050-EEc1tfj56GG1KdiEBT09tXwIScePERE_PrgbvCTBcdTDAPgN1Tx3b9esA47spwIfoIX2NB08kFfhn4W9mNL-3ZM4CriC0q35RXUsYXaSbQKF9Yk"/>
</div>
<div class="absolute -top-0.5 -right-0.5 size-3 bg-red-500 rounded-full border-2 border-background-dark"></div>
</div>
<!-- Toggle/Filter Title -->
<div class="flex flex-col items-center cursor-pointer">
<h1 class="text-lg font-bold tracking-tight flex items-center gap-1">
                Discover Jobs
                <span class="material-symbols-outlined text-primary text-xl">expand_more</span>
</h1>
<span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Istanbul • Design • +50km</span>
</div>
<!-- Settings Filter -->
<button class="size-10 flex items-center justify-center rounded-full bg-slate-200 dark:bg-card-dark text-slate-600 dark:text-slate-300 hover:text-primary transition-colors">
<span class="material-symbols-outlined">tune</span>
</button>
</header>
<!-- Main Card Stack -->
<main class="flex-1 relative w-full max-w-md mx-auto px-4 py-2 flex flex-col items-center justify-center min-h-0">
<!-- Background Stack Effect (Third Card) -->
<div class="absolute top-8 w-[85%] h-[80%] bg-slate-200 dark:bg-card-dark rounded-xl shadow-lg transform translate-y-6 scale-90 opacity-40 z-0"></div>
<!-- Background Stack Effect (Second Card) -->
<div class="absolute top-5 w-[92%] h-[80%] bg-slate-300 dark:bg-card-dark rounded-xl shadow-lg transform translate-y-3 scale-95 opacity-70 z-10 overflow-hidden">
<!-- Subtle image hint -->
<div class="absolute inset-0 bg-slate-800/50"></div>
<img class="w-full h-full object-cover opacity-30 mix-blend-overlay" data-alt="Office building abstract pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKfRgPNyNWrGtH13clO0ogguuYKogkOKcnKCalr9pRMKH-r4ZTxa7ds0hUHTEBv-qJA_Ud9W5mU1J74Mz0xvQCtPSpzbecC_tusSGDkU7MEd72s65Z5b-m1Brn9lrvWMcgDC4SsbB3tcbXxo3yAfQnz1XvekH0n2efsbiNnlZClAz7zaJb1GUeu0hcKubHJjwUd3hMLV9qSP0SfHNG46QmGs-bpPvoTU7asPCTOqGaZcBSGV1Vn4IpkpeIH3lpAAB-yfQLNkvAYuuJ"/>
</div>
<!-- Active Card -->
<div class="relative w-full h-full max-h-[650px] bg-slate-900 rounded-xl shadow-2xl z-20 overflow-hidden group select-none cursor-grab active:cursor-grabbing border border-white/5">
<!-- Main Card Image -->
<div class="absolute inset-0 bg-slate-800">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="Modern bright open plan office space with plants and desks" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCo-FUzmaKmutA_Z9ED_RFcYWanC7kRl4yLdUqrh5BWa4OVV4YVX7CkbitRf2_PtVeRmCXtkhbfEZq-9bwDrYIv0fbeFPpNLXOV9lKWpnrWiessIj4U7Ff-m_rxPFi9iHt2uPKvGN-mDHj3tGU1rfSUAk2kDzbKzBp3tDcuexrqUMJNPHTHwYP5gX2PUU2eTRcF3EM8syAraB1Td4KhQaktHjvqskzA490k4_e77MQkTUQ_6KLx3mAQs364HqbpSTPubepuUkW-GSLC"/>
</div>
<!-- Gradient Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent via-60% to-black/95 to-90%"></div>
<!-- Top Right: Info/Flip Button -->
<button class="absolute top-4 right-4 size-10 rounded-full bg-black/20 backdrop-blur-md border border-white/10 flex items-center justify-center text-white hover:bg-black/40 transition-colors z-30">
<span class="material-symbols-outlined">info</span>
</button>
<!-- Card Content -->
<div class="absolute bottom-0 w-full p-6 flex flex-col gap-4 z-30">
<!-- Company Header -->
<div class="flex items-center gap-3">
<div class="size-12 bg-white rounded-lg p-1 shadow-lg shrink-0">
<img class="w-full h-full object-contain" data-alt="Spotify company logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5z8uvVu9-5U8eEMtrtNr8pNaeVr-Dupdl9-8Zij0iQ0yoA648U34jD68TZ78YLbEXk_07we9w9VLzn-9y6yQPJwwvzeBwOPJ1xun9IUIKlrwLWQcC30uFLCLwoAGtVMef8kwWdkkJWtVh2JyBYgEH1f5s-79G7k-iLnsexG9pHJbXTeh3AGGlOEU7W_MxSyBCddY6RJA7TWTFj90FFTXgNj3w7f_eqcY7r9ZRIY89_snaN31db_rGbnwecDXWnLun0wctCtTZYtQQ"/>
</div>
<div class="flex flex-col">
<span class="text-white font-bold text-2xl tracking-tight drop-shadow-md">Senior UX Designer</span>
<span class="text-primary font-medium text-sm">Spotify</span>
</div>
</div>
<!-- Location & Type -->
<div class="flex items-center gap-2 text-slate-300 text-sm font-medium">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<p>Istanbul, TR • Remote Friendly</p>
</div>
<!-- Chips/Tags -->
<div class="flex flex-wrap gap-2 pt-1">
<div class="flex h-8 items-center justify-center px-4 rounded-full bg-white/10 backdrop-blur-md border border-white/10">
<p class="text-white text-xs font-semibold tracking-wide">Full-time</p>
</div>
<div class="flex h-8 items-center justify-center px-4 rounded-full bg-white/10 backdrop-blur-md border border-white/10">
<p class="text-white text-xs font-semibold tracking-wide">$4k - $6k/mo</p>
</div>
<div class="flex h-8 items-center justify-center px-4 rounded-full bg-primary/20 backdrop-blur-md border border-primary/40">
<p class="text-primary-300 text-xs font-bold tracking-wide uppercase text-white">Urgent Hiring</p>
</div>
</div>
</div>
<!-- Swipe Overlay Indicators (Hidden by default, shown on swipe logic) -->
<!-- <div class="absolute top-10 left-10 -rotate-12 border-4 border-green-500 rounded-lg px-4 py-2 opacity-0">
                <span class="text-4xl font-bold text-green-500 uppercase tracking-widest">Apply</span>
            </div> -->
</div>
</main>
<!-- Interaction Bar -->
<div class="flex items-center justify-center gap-6 pb-8 pt-4 shrink-0 z-30 px-4">
<!-- Rewind -->
<button class="group flex items-center justify-center size-12 rounded-full bg-white dark:bg-card-dark shadow-lg border border-slate-200 dark:border-white/5 text-amber-400 hover:bg-amber-50 dark:hover:bg-amber-900/20 transition-all active:scale-90">
<span class="material-symbols-outlined text-[24px] group-hover:-rotate-180 transition-transform duration-500">replay</span>
</button>
<!-- Reject / Pass -->
<button class="flex items-center justify-center size-16 rounded-full bg-white dark:bg-card-dark shadow-lg border border-slate-200 dark:border-white/5 text-rose-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-all active:scale-90 active:bg-rose-100">
<span class="material-symbols-outlined text-[36px]">close</span>
</button>
<!-- Super Like -->
<button class="flex items-center justify-center size-12 rounded-full bg-white dark:bg-card-dark shadow-lg border border-slate-200 dark:border-white/5 text-blue-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all active:scale-90 active:-translate-y-1">
<span class="material-symbols-outlined text-[28px] fill-current">star</span>
</button>
<!-- Apply / Like -->
<button class="flex items-center justify-center size-16 rounded-full bg-primary shadow-glow shadow-primary/40 text-white hover:bg-sky-400 transition-all active:scale-90 active:shadow-none">
<span class="material-symbols-outlined text-[36px]">check</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<nav class="shrink-0 bg-white/80 dark:bg-[#152229]/80 backdrop-blur-xl border-t border-slate-200 dark:border-white/5 px-6 pb-6 pt-3 flex items-center justify-between z-40">
<a class="flex flex-col items-center justify-end gap-1 flex-1 text-primary group" href="#">
<div class="relative">
<span class="material-symbols-outlined text-[28px] fill-current group-hover:scale-110 transition-transform">style</span>
</div>
</a>
<a class="flex flex-col items-center justify-end gap-1 flex-1 text-slate-400 dark:text-slate-500 hover:text-rose-400 transition-colors group" href="#">
<div class="relative">
<span class="material-symbols-outlined text-[28px] group-hover:scale-110 transition-transform">favorite</span>
<span class="absolute top-0 right-0 size-2 bg-rose-500 rounded-full"></span>
</div>
</a>
<a class="flex flex-col items-center justify-end gap-1 flex-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[28px] group-hover:scale-110 transition-transform">chat_bubble</span>
</a>
<a class="flex flex-col items-center justify-end gap-1 flex-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[28px] group-hover:scale-110 transition-transform">person</span>
</a>
</nav>
</body></html>
